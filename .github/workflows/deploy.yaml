name: FinTech Secure CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 app/app.py --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Build Docker Image
      run: |
        cd app
        docker build -t fintech-payroll-api:latest .

    - name: Simulate Vulnerability Scan & ECR Push
      run: |
        echo "Simulating Trivy vulnerability scan for GDPR compliance..."
        echo "Scan passed: 0 Critical, 0 High vulnerabilities."
        echo "Simulating push to AWS ECR..."
        echo "Deployment to ECS Triggered."
